# Render Blueprint - Telegram Video Downloader Bot

previews:
  generation: off

services:
  - type: web
    name: telegram-video-bot
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      # Bot token - REQUIRED: Set this in Render Dashboard
      - key: TELEGRAM_BOT_TOKEN
        sync: false

      # External URL - Auto-populated from Render's default env var
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: telegram-video-bot
          envVarKey: RENDER_EXTERNAL_URL

      # Server configuration
      - key: PORT
        value: "8080"
      - key: GIN_MODE
        value: "release"

      # Debug mode
      - key: DEBUG
        value: "false"

      # Optional: Path to cookies file for authenticated downloads
      - key: COOKIES_FILE
        value: ""

envVarGroups:
  - name: bot-configuration
    envVars:
      - key: LOG_LEVEL
        value: "info"
      - key: REQUEST_TIMEOUT
        value: "60"
      - key: MAX_FORMATS
        value: "10"
